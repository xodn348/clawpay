name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Verify coverage
        if: matrix.node-version == '22.x'
        run: |
          npm run test:coverage
          COVERAGE=$(npx c8 report --reporter=text-summary 2>/dev/null | grep 'Statements' | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          INT_COV=${COVERAGE%.*}
          if [ "$INT_COV" -lt 90 ]; then
            echo "ERROR: Coverage dropped below 90% (${COVERAGE}%)"
            exit 1
          fi
      - name: Security scan for hardcoded keys
        run: |
          # Check for actual API keys (sk_test_ or sk_live_ followed by 20+ alphanumeric chars)
          # Excludes validation strings like 'startsWith("sk_test_")' and placeholder text
          if grep -rP 'sk_(live|test)_[a-zA-Z0-9]{20,}' src/; then
            echo "ERROR: Hardcoded Stripe keys found in source code"
            exit 1
          fi
          if grep -r 'eval(' src/ || grep -r 'Function(' src/; then
            echo "ERROR: Dangerous code patterns found"
            exit 1
          fi
          echo "Security scan passed"
      - name: Security scan - PayPal credentials
        run: |
          # Check for hardcoded PayPal Client IDs (80+ character alphanumeric strings)
          # Pattern: PAYPAL_CLIENT_ID = followed by a long alphanumeric string
          # Excludes environment variable references like process.env.PAYPAL_CLIENT_ID
          if grep -rn 'PAYPAL_CLIENT_ID\s*=\s*[A-Za-z0-9]\{80,\}' src/; then
            echo "ERROR: Hardcoded PayPal Client ID found in source code"
            exit 1
          fi
          # Also check for hardcoded PayPal Client Secrets (similar pattern)
          if grep -rn 'PAYPAL_CLIENT_SECRET\s*=\s*[A-Za-z0-9]\{40,\}' src/; then
            echo "ERROR: Hardcoded PayPal Client Secret found in source code"
            exit 1
          fi
          echo "PayPal credentials security scan passed"
